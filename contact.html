<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="public/logo.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ondel-ondel-cookies</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://cdn.jsdelivr.net/npm/flowbite@4.0.1/dist/flowbite.min.css" rel="stylesheet" />
  <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
      <style>
    /* ===== Scroll Top Button ===== */
    #scrollTopBtn{
      position:fixed; bottom:35px; right:35px; width:55px; height:55px;
      border:none; border-radius:50%; cursor:pointer;
      background:linear-gradient(135deg,#8B5E34,#F28C38);
      box-shadow:0 8px 25px rgba(242,140,56,.5);
      display:flex; align-items:center; justify-content:center;
      opacity:0; visibility:hidden; transform:translateY(20px);
      transition:all .4s ease; z-index:999;
    }
    #scrollTopBtn.show{opacity:1; visibility:visible; transform:translateY(0)}
    #scrollTopBtn:hover{transform:translateY(0) scale(1.1); box-shadow:0 12px 30px rgba(244,180,0,.7)}
    #scrollTopBtn svg{width:26px;height:26px;display:block}

    /* ===== Premium background accents ===== */
    .bg-accents::before,.bg-accents::after{
      content:""; position:fixed; width:520px; height:520px; border-radius:999px;
      filter:blur(90px); opacity:.18; pointer-events:none; z-index:0;
    }
    .bg-accents::before{top:-170px; left:-170px; background:#c0602a;}
    .bg-accents::after{bottom:-190px; right:-190px; background:#d4a96a;}

    .soft-divider{height:1px;background:linear-gradient(to right,transparent,#2a1f10,transparent);}

    .badge{
      display:inline-flex; align-items:center; gap:.5rem;
      padding:.45rem .9rem; border-radius:999px;
      border:1px solid #2a1f10; background:rgba(13,9,5,.55);
      color:#b8a898; font-size:.75rem; letter-spacing:.18em; text-transform:uppercase;
      font-family:'DM Sans',sans-serif;
    }

    .glass{
      background:rgba(22,16,8,.78);
      border:1px solid #2a1f10;
      backdrop-filter:blur(10px);
    }
    .card{border-radius:20px; transition:transform .25s ease,border-color .25s ease;}
    .card:hover{transform:translateY(-4px); border-color:rgba(212,169,106,.35);}

    .title{
      font-family:'Playfair Display',serif;
      font-style:italic;
    }

    .icon-chip{
      width:46px;height:46px;border-radius:14px;
      display:flex;align-items:center;justify-content:center;
      border:1px solid #2a1f10;background:rgba(13,9,5,.55);
      flex:0 0 auto;
    }

    .field{
      width:100%;
      background:#0d0905;border:1px solid #2a1f10;color:#f5f0e8;
      border-radius:14px;padding:12px 14px;outline:none;
      transition:border-color .2s ease, box-shadow .2s ease;
    }
    .field:focus{border-color:#c0602a; box-shadow:0 0 0 4px rgba(192,96,42,.12);}
    .muted{color:#7a6e62}
  </style>
</head>

<body class="bg-[#0a0805]">
  <div id="app"></div>
  <script type="module" src="/src/contact.js"></script>
</body>

</html>
